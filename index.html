<!DOCTYPE html>
<html>
<head>
    <title>CI Dashboard</title>
    <style>
        body {
            font-family: Arial;
            margin: 20px;
        }

        .card {
            display: inline-block;
            width: 200px;
            margin: 10px;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 0 5px #ccc;
        }

        h1 {
            color: #333;
        }

        .value {
            font-size: 30px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<h1>CI Dashboard</h1>

<div class="card">
    <h3>OEE</h3>
    <div class="value">82%</div>
</div>

<div class="card">
    <h3>Waste</h3>
    <div class="value">1.8%</div>
</div>

<div class="card">
    <h3>Downtime</h3>
    <div class="value">120</div>
</div>

</body>
</html>
